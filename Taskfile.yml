version: "3"

tasks:
  install:
    desc: Install dev dependencies
    cmds:
      - uv sync

  test:
    desc: Run tests
    cmds:
      - pytest {{.CLI_ARGS}}

  coverage:
    desc: Coverage gate — unit 100% (fast suite) then e2e journey floor (.agents)
    cmds:
      # Unit gate: 100% testable-line branch coverage on the fast suite. This is
      # the coverage authority — every testable line of shipped runtime is here.
      - python tasks/coverage.py --fail-under=100 {{.CLI_ARGS}} -- -m "not e2e"
      # E2E gate: branch-coverage floor of .agents from real journeys. Journeys
      # drive happy/realistic paths only; Docker-in-Docker (container/compose),
      # real-harness spawn (implement veto/checkpoint), worktree plumbing and the
      # gate toolchain cannot run inside the devcontainer, so e2e caps well below
      # the unit gate. Floor guards journey regression; the unit gate guards lines.
      - python tasks/coverage.py --source=.agents --fail-under=45 -- -m e2e

  lint:
    desc: Lint with ruff
    cmds:
      - ruff check .

  format:
    desc: Format with ruff
    cmds:
      - ruff format .
      - ruff check . --fix

  typecheck:
    desc: Type-check with pyright
    cmds:
      - pyright

  check:
    desc: Lint, format, and typecheck
    cmds:
      - task: lint
      - task: format
      - task: typecheck

  release:
    desc: Tag and push a release
    cmds:
      - python tasks/release.py {{.CLI_ARGS}}

  docs:sync:
    desc: Sync docs
    cmds:
      - python tasks/docs_sync.py {{.CLI_ARGS}}
