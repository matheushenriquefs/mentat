pre-commit:
  parallel: true
  commands:
    stale-ref:
      glob: "**/*"
      run: |
        out=$(rg -n '\bmentat-update\b|\bmentat-credits-gen\b|upstreams\.jsonc|/to-(rebase|commit|plan|implement|scaffold|eval)\b' {staged_files} 2>/dev/null || true)
        [ -z "$out" ] && exit 0
        echo "stale-ref advisory: $out" && exit 0
    style-lint:
      glob: "{.agents/skills/mentat-*/SKILL.md,.agents/agents/*.md}"
      run: python3 .agents/lib/style/lint.py {staged_files}
    holding-branch-guard:
      run: |
        [ "${MENTAT_RELEASE:-0}" = "1" ] && exit 0
        h="$(git symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null \
            || { echo "ERR: holding-branch-guard: cannot resolve holding branch name"; exit 1; })"
        b="$(git rev-parse --abbrev-ref HEAD)"
        [ "$b" = "$h" ] && { echo "ERR: direct commit to holding branch '$h' — ADR-0002"; exit 1; }
        exit 0
    ruff-format:
      glob: "**/*.py"
      run: python3 ~/.agents/skills/mentat-container/scripts/container.py run 'uv run ruff format --check {staged_files}'
    ruff-lint:
      glob: "**/*.py"
      run: python3 ~/.agents/skills/mentat-container/scripts/container.py run 'uv run ruff check {staged_files}'
    pyright:
      glob: "**/*.py"
      run: python3 ~/.agents/skills/mentat-container/scripts/container.py run 'uv run pyright'
    pytest-fast:
      glob: "**/*.py"
      run: python3 ~/.agents/skills/mentat-container/scripts/container.py run 'pytest tests/ -q'
