[build-system]
requires = []

[tool.uv]
package = false

[project]
name = "mentat"
version = "0.1.0"
requires-python = ">=3.11"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pyright",
    "ruff",
    "pydantic",
    "pyyaml",
]

[tool.pytest.ini_options]
testpaths = ["tests", "evals/pytest"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
pythonpath = []

[tool.ruff]
target-version = "py311"
line-length = 120
src = ["tests", "evals/pytest", ".agents/skills", ".agents/lib", "tasks"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
"evals/pytest/*.py" = ["E402", "E501", "E741", "F841", "B904", "B011", "SIM"]
".agents/skills/*/scripts/*.py" = ["E402"]
"tests/*.py" = ["SIM117", "SIM105", "E501"]

[tool.ruff.format]
quote-style = "double"

[tool.pyright]
include = ["tests", ".agents/skills/mentat-*/scripts", ".agents/lib", "tasks"]
exclude = [".agents/docs/adr/archive", "tests/fixtures", "evals/pytest", "tests", "conftest.py"]
pythonVersion = "3.11"
typeCheckingMode = "strict"
