version: "3"

tasks:
  install:
    desc: Install dev dependencies
    cmds:
      - uv sync

  test:
    desc: Run tests
    cmds:
      - pytest {{.CLI_ARGS}}

  coverage:
    desc: Coverage gate — unit 100% (fast suite) then e2e 99% (.agents)
    cmds:
      # Unit gate: 100% testable-line branch coverage on the fast suite.
      - python tasks/coverage.py {{.CLI_ARGS}} -- -m "not e2e"
      # E2E gate: 99% branch coverage of .agents from the e2e journeys.
      - python tasks/coverage.py --source=.agents --fail-under=99 -- -m e2e

  lint:
    desc: Lint with ruff
    cmds:
      - ruff check .

  format:
    desc: Format with ruff
    cmds:
      - ruff format .
      - ruff check . --fix

  typecheck:
    desc: Type-check with pyright
    cmds:
      - pyright

  check:
    desc: Lint, format, and typecheck
    cmds:
      - task: lint
      - task: format
      - task: typecheck

  release:
    desc: Tag and push a release
    cmds:
      - python tasks/release.py {{.CLI_ARGS}}

  docs:sync:
    desc: Sync docs
    cmds:
      - python tasks/docs_sync.py {{.CLI_ARGS}}
