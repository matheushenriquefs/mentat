[build-system]
requires = []

[tool.uv]
package = false

[project]
name = "mentat"
version = "0.1.0"
requires-python = ">=3.11"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pyright",
    "ruff",
    "pydantic",
    "pyyaml",
]

[tool.pytest.ini_options]
testpaths = ["evals/pytest"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
target-version = "py311"
line-length = 120
src = ["evals/pytest"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.pyright]
include = ["evals/pytest"]
pythonVersion = "3.11"
typeCheckingMode = "standard"
